name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    # Scoped to this job (not workflow-wide): only release-please needs write access —
    # to open/update the Release PR and push the tag + GitHub Release.
    permissions:
      contents: write
      pull-requests: write
    # Don't run on forks — only the canonical repo cuts releases.
    if: github.repository == 'acatl/okf-docs'
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
