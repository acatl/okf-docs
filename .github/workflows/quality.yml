name: quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: docs + skills checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Markdown lint
        run: npm run lint:md

      - name: Spell check
        run: npm run spell

      - name: Skill resource bundles in sync
        run: npm run sync:check

      - name: Skill frontmatter
        run: npm run skills:check

  links:
    name: internal link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Lychee (offline / internal links)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: "--offline --no-progress './**/*.md'"
          fail: true

  shellcheck:
    name: shellcheck scripts/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Shellcheck
        run: shellcheck scripts/*.sh
